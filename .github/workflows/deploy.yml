name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Stop running container
        working-directory: /opt/personal-wealth-manager
        run: docker compose down

      - name: Pull latest code
        working-directory: /opt/personal-wealth-manager
        run: git pull origin master

      - name: Build Docker image
        working-directory: /opt/personal-wealth-manager
        run: docker compose build --no-cache

      - name: Start container
        working-directory: /opt/personal-wealth-manager
        run: docker compose up -d

      - name: Verify container is running
        run: |
          sleep 10
          docker compose -f /opt/personal-wealth-manager/docker-compose.yml ps
          docker compose -f /opt/personal-wealth-manager/docker-compose.yml exec -T personal-wealth-manager wget -qO- http://localhost:3000/api/accounts > /dev/null && echo "✅ Health check passed" || echo "⚠️ Health check failed"
